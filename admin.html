<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="initAdmin()">

<div class="app-shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-icon">🏥</div>
      <span>MediCore HMS</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar">A</div>
        <span>Admin</span>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="nav-item active" onclick="activatePage('dashboard','nav1')" id="nav1">📊 Dashboard</div>
    <div class="nav-item" onclick="activatePage('patients','nav2')" id="nav2">🧑 Patients</div>
    <div class="nav-item" onclick="activatePage('doctors','nav3')" id="nav3">👨‍⚕️ Doctors</div>
    <div class="nav-item" onclick="activatePage('appointments','nav4')" id="nav4">📅 Appointments</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div class="page active" id="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div>
            <div class="stat-label">Patients</div>
            <div class="stat-value" id="totalPatients"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon green">👨‍⚕️</div>
          <div>
            <div class="stat-label">Doctors</div>
            <div class="stat-value" id="totalDoctors"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon amber">📅</div>
          <div>
            <div class="stat-label">Appointments</div>
            <div class="stat-value" id="totalAppointments"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- PATIENTS -->
    <div class="page" id="patients">
      <div class="card">
        <div class="card-header"><h3>All Patients</h3></div>
        <div class="card-body">
          <table id="patientTable"></table>
        </div>
      </div>
    </div>

    <!-- DOCTORS -->
    <div class="page" id="doctors">
      <div class="card">
        <div class="card-header"><h3>All Doctors</h3></div>
        <div class="card-body">
          <table id="doctorTable"></table>
        </div>
      </div>
    </div>

    <!-- APPOINTMENTS -->
    <div class="page" id="appointments">
      <div class="card">
        <div class="card-header"><h3>All Appointments</h3></div>
        <div class="card-body">
          <table id="apptTable"></table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
async function initAdmin() {
  requireLogin('admin');
  await Promise.all([loadPatients(), loadDoctors(), loadAppointments()]);
}

async function loadPatients() {
  const res = await fetch('http://localhost:8000/getPatients');
  const raw = await res.text();
  const rows = raw.split('##').filter(s => s.trim());

  document.getElementById('totalPatients').innerText = rows.length;

  let html = "<tr><th>ID</th><th>Name</th><th>Phone</th></tr>";
  rows.forEach(row => {
    const [id, name, phone] = row.split('|');
    html += `<tr><td>${id}</td><td>${name}</td><td>${phone}</td></tr>`;
  });
  document.getElementById('patientTable').innerHTML = html;
}

async function loadDoctors() {
  const res = await fetch('http://localhost:8000/getDoctors');
  const raw = await res.text();
  const rows = raw.split('##').filter(s => s.trim());

  document.getElementById('totalDoctors').innerText = rows.length;

  let html = "<tr><th>ID</th><th>Name</th><th>Specialization</th><th>Phone</th><th>Available Days</th></tr>";
  rows.forEach(row => {
    const [id, name, spec, phone, days] = row.split('|');
    html += `<tr><td>${id}</td><td>${name}</td><td>${spec}</td><td>${phone}</td><td>${days}</td></tr>`;
  });
  document.getElementById('doctorTable').innerHTML = html;
}

async function loadAppointments() {
  const res = await fetch('http://localhost:8000/getAppointments');
  const raw = await res.text();
  const rows = raw.split('##').filter(s => s.trim());

  document.getElementById('totalAppointments').innerText = rows.length;

  let html = "<tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th></tr>";
  rows.forEach(row => {
    const [id, patient, doctor, datetime, status] = row.split('|');
    const badgeClass = status === 'scheduled' ? 'badge-amber'
                     : status === 'completed' ? 'badge-green'
                     : 'badge-red';
    html += `<tr>
      <td>${id}</td><td>${patient}</td><td>${doctor}</td>
      <td>${datetime}</td>
      <td><span class="badge ${badgeClass}">${status}</span></td>
    </tr>`;
  });
  document.getElementById('apptTable').innerHTML = html;
}
</script>

</body>
</html>
