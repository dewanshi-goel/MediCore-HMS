<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="initAdmin()">

<div class="app-shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-icon">🏥</div>
      <span>MediCore HMS</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar">A</div>
        <span>Admin</span>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="nav-item active" onclick="activatePage('dashboard','nav1')" id="nav1">📊 Dashboard</div>
    <div class="nav-item" onclick="activatePage('patients','nav2')" id="nav2">🧑 Patients</div>
    <div class="nav-item" onclick="activatePage('doctors','nav3')" id="nav3">👨‍⚕️ Doctors</div>
    <div class="nav-item" onclick="activatePage('appointments','nav4')" id="nav4">📅 Appointments</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- DASHBOARD -->
    <div class="page active" id="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div>
            <div class="stat-label">Patients</div>
            <div class="stat-value" id="totalPatients"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon green">👨‍⚕️</div>
          <div>
            <div class="stat-label">Doctors</div>
            <div class="stat-value" id="totalDoctors"></div>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon amber">📅</div>
          <div>
            <div class="stat-label">Appointments</div>
            <div class="stat-value" id="totalAppointments"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- PATIENTS -->
    <div class="page" id="patients">
      <div class="card">
        <div class="card-header"><h3>All Patients</h3></div>
        <div class="card-body">
          <table id="patientTable"></table>
        </div>
      </div>
    </div>

    <!-- DOCTORS -->
    <div class="page" id="doctors">
      <div class="card">
        <div class="card-header"><h3>All Doctors</h3></div>
        <div class="card-body">
          <table id="doctorTable"></table>
        </div>
      </div>
    </div>

    <!-- APPOINTMENTS -->
    <div class="page" id="appointments">
      <div class="card">
        <div class="card-header"><h3>All Appointments</h3></div>
        <div class="card-body">
          <table id="apptTable"></table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
function initAdmin(){
  requireLogin('admin');

  document.getElementById('totalPatients').innerText = DB.patients.length;
  document.getElementById('totalDoctors').innerText = DB.doctors.length;
  document.getElementById('totalAppointments').innerText = DB.appointments.length;

  loadPatients();
  loadDoctors();
  loadAppointments();
  loadStats();
}

function loadPatients(){
  let html = "<tr><th>ID</th><th>Name</th><th>Phone</th></tr>";
  DB.patients.forEach(p=>{
    html += `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.phone}</td></tr>`;
  });
  document.getElementById('patientTable').innerHTML = html;
}

function loadDoctors(){
  let html = "<tr><th>ID</th><th>Name</th><th>Specialization</th></tr>";
  DB.doctors.forEach(d=>{
    html += `<tr><td>${d.id}</td><td>${d.name}</td><td>${d.specialization}</td></tr>`;
  });
  document.getElementById('doctorTable').innerHTML = html;
}

async function loadAppointments() {
  const res  = await fetch('http://localhost:8000/getAppointments');
  const raw  = await res.text();

  const table = document.getElementById('apptTable');

  if (!raw || !raw.trim()) {
    table.innerHTML = "<tr><td colspan='5'>No appointments found.</td></tr>";
    return;
  }

  let html = "<tr><th>ID</th><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Status</th></tr>";

  raw.split("##").filter(s => s.trim() !== "").forEach(row => {
    const [id, patient, doctor, datetime, status, type] = row.split("|");
    const badgeClass = status === 'scheduled' ? 'badge-blue'
                     : status === 'completed' ? 'badge-green'
                     : 'badge-red';
    html += `<tr>
      <td>${id}</td>
      <td>${patient}</td>
      <td>${doctor}</td>
      <td>${datetime}</td>
      <td><span class="badge ${badgeClass}">${status}</span></td>
    </tr>`;
  });

  table.innerHTML = html;
}

async function loadStats() {
  const res = await fetch('http://localhost:8000/getAppointments');
  const raw = await res.text();
  const count = raw ? raw.split("##").filter(s => s.trim() !== "").length : 0;
  document.getElementById('totalAppointments').innerText = count;
  // patients and doctors still from mock — good enough for demo
  document.getElementById('totalPatients').innerText = DB.patients.length;
  document.getElementById('totalDoctors').innerText = DB.doctors.length;
}
</script>

</body>
</html>
